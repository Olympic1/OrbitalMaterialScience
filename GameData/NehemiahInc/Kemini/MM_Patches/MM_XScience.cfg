// Module Manager patch to make the [x] Science! mod ignore KEES experiments
@ScienceChecklist:AFTER[?x??Science!]:NEEDS[?x??Science!]
{
	@CelestialBodyFilters
	{
		%NE_KEES_TEST =			AvoidAll
		%NE_KEES_PPMD =			AvoidAll
		%NE_KEES_ODC =			AvoidAll
		%NE_KEES_POSA1 =		AvoidAll
		%NE_KEES_POSA2 =		AvoidAll
	}
}
